set -g mouse on
# Remap "r" to reload tmux config
unbind r
bind r source-file ~/.tmux.conf
# Bind leader key to "<CTRL> + s"
unbind C-b
set -g prefix C-s
bind C-s send-prefix
# Set history limit
set -g history-limit 1000000
# Allow complex terminal colours
set -s default-terminal 'tmux-256color'
# Enable clipboard operation
set-option -g set-clipboard on
# Split panes with "q" (horizontal) and "e" (vertival)
unbind '"'
unbind %
bind q split-window -h -c "#{pane_current_path}"
bind e split-window -v -c "#{pane_current_path}"
# Start Windows & Panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Top directory bar
set -g pane-border-status top
set -g pane-border-format "#[bg=#6272a4,fg=black]  #{pane_current_path} #[default]"

# Keep tmux status bar at the bottom
set -g status-position bottom

# Beginning and end of line
bind-key -n C-a send-keys Home
bind-key -n C-e send-keys End

# Session manager popup: prefix + Ctrl-P
bind C-p display-popup -E -w 60% -h 50% "~/.tmux/session-manager.sh"

# New pentest session popup: prefix + Ctrl-T
bind C-t display-popup -E -w 60% -h 60% "bash -c 'read -p \"Client name: \" c; read -p \"Scope (IP/domain  |  f=pick file  |  blank=paste): \" s; if [ \"\$s\" = \"f\" ]; then s=\$(find \$HOME -type f \\( -name \"*.txt\" -o -name \"*.list\" -o -name \"*.csv\" \\) 2>/dev/null | fzf --prompt=\"  Scope file: \" --border=rounded --preview=\"head -30 {}\" --preview-window=right:50%); fi; ~/.tmux/pentest.sh \"\$c\" \"\$s\"'"

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Some sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Auto-restore sessions when tmux starts
set -g @continuum-restore 'on'
# Auto-save every 5 minutes
set -g @continuum-save-interval '5'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
